name: Hello world
on:
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Build step
      run: echo "A demo build"
    - name: Print name
      run: echo "My name is ${{vars.MY_NAME}}"
    
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Test phase
      run: echo "Running test cases"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Deploy phase
      run: echo "Deploying the app"
  
    
